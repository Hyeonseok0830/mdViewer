name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 컴파일
        run: npm run build

      - name: Windows 빌드 (NSIS + Portable + APPX 한 번에)
        run: npx electron-builder --win nsis portable appx -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        continue-on-error: false

      - name: APPX → MSIX 복사 (스토어 제출용)
        shell: pwsh
        run: |
          $appxFiles = Get-ChildItem release/ -Filter *.appx -ErrorAction SilentlyContinue
          foreach ($f in $appxFiles) {
            $msix = $f.FullName -replace '\.appx$', '.msix'
            Copy-Item $f.FullName $msix
            Write-Host "생성: $msix"
          }

      - name: 빌드 결과 목록
        shell: pwsh
        run: Get-ChildItem release/ -Recurse -Include *.exe,*.appx,*.msix | Format-Table Name,Length

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mdViewer-windows-${{ github.ref_name || 'dev' }}
          path: |
            release/*.exe
            release/*.appx
            release/*.msix
          if-no-files-found: error
          retention-days: 30

      - name: Release에 업로드
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.appx
            release/*.msix
          overwrite: true
          body_path: .github/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 컴파일
        run: npm run build

      - name: DMG 빌드 (x64 + arm64)
        run: npx electron-builder --mac dmg --x64 --arm64 -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 빌드 결과 목록
        run: ls -lh release/

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mdViewer-macos-${{ github.ref_name || 'dev' }}
          path: release/*.dmg
          retention-days: 30

      - name: Release에 업로드
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*.dmg
          overwrite: true
          body_path: .github/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 컴파일
        run: npm run build

      - name: Linux 빌드 (AppImage + deb 한 번에)
        run: npx electron-builder --linux AppImage deb -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 빌드 결과 목록
        run: ls -lh release/

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mdViewer-linux-${{ github.ref_name || 'dev' }}
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Release에 업로드
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.AppImage
            release/*.deb
          overwrite: true
          body_path: .github/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
