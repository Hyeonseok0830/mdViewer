name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: 0.1.0)'
        required: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 컴파일
        run: npm run build

      - name: 아이콘 확인
        run: |
          if (!(Test-Path "assets/icon.ico")) {
            Write-Warning "assets/icon.ico 없음 — 기본 Electron 아이콘 사용"
          }
        shell: pwsh

      - name: NSIS 인스톨러 빌드
        run: npx electron-builder --win --target=nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: APPX 빌드 (Microsoft Store)
        run: npx electron-builder --win --target=appx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # publisher 정보 미설정 시 실패 가능

      - name: 빌드 결과 목록
        run: Get-ChildItem release/ -Recurse -Include *.exe,*.appx | Format-Table Name,Length
        shell: pwsh

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mdViewer-windows-${{ github.ref_name || 'dev' }}
          path: |
            release/*.exe
            release/*.appx
          retention-days: 30

      - name: GitHub 릴리즈 생성
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: mdViewer ${{ github.ref_name }}
          body: |
            ## mdViewer ${{ github.ref_name }}

            ### 설치 방법

            #### 일반 설치 (권장)
            `mdViewer-Setup-*.exe` 다운로드 후 실행

            #### 포터블 실행
            `mdViewer-*-portable.exe` 다운로드 후 바로 실행

            #### Microsoft Store (APPX)
            `mdViewer-*.appx` 다운로드 후 더블클릭 설치
            > ⚠ Store 인증서가 없는 경우 개발자 모드에서만 설치 가능합니다.

            ### 변경 사항
            <!-- 릴리즈 노트를 여기에 작성하세요 -->

            ---
            `.md` 파일 우클릭 → **mdViewer로 열기** 또는 폴더를 드래그하여 실행
          files: |
            release/*.exe
            release/*.appx
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
