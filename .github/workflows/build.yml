name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: TypeScript 컴파일
        run: npm run build

      - name: NSIS 인스톨러 빌드
        run: npx electron-builder --win nsis -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Portable 빌드 (설치 불필요)
        run: npx electron-builder --win portable -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: APPX 빌드 (Microsoft Store)
        run: npx electron-builder --win appx -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        continue-on-error: true

      - name: APPX → MSIX 복사 (스토어 제출용)
        shell: pwsh
        run: |
          Get-ChildItem release/*.appx | ForEach-Object {
            $msix = $_.FullName -replace '\.appx$', '.msix'
            Copy-Item $_.FullName $msix
            Write-Host "생성: $msix"
          }

      - name: 빌드 결과 목록
        shell: pwsh
        run: Get-ChildItem release/ -Recurse -Include *.exe,*.appx,*.msix | Format-Table Name,Length

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mdViewer-windows-${{ github.ref_name || 'dev' }}
          path: |
            release/*.exe
            release/*.appx
            release/*.msix
          retention-days: 30

      - name: NSIS 인스톨러 Release에 업로드
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.appx
            release/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
