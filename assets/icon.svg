<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 배경 -->
  <rect width="256" height="256" rx="48" ry="48" fill="#1a1f2e"/>

  <!-- M 자: 5개 사각형 조합 -->
  <!-- 왼쪽 세로 기둥 -->
  <rect x="36" y="44" width="40" height="164" rx="4" fill="#58a6ff"/>
  <!-- 오른쪽 세로 기둥 -->
  <rect x="180" y="44" width="40" height="164" rx="4" fill="#58a6ff"/>
  <!-- 왼쪽 대각선 (왼 상단 → 중앙 하단) -->
  <polygon points="76,44 114,44 128,122 90,148" fill="#58a6ff"/>
  <!-- 오른쪽 대각선 (오른 상단 → 중앙 하단) -->
  <polygon points="180,44 142,44 128,122 166,148" fill="#58a6ff"/>
  <!-- 중앙 연결 꼭짓점 (삼각형 보정) -->
  <polygon points="90,148 128,122 166,148 128,164" fill="#58a6ff"/>

  <!-- 하단 강조선 -->
  <rect x="44" y="218" width="168" height="8" rx="4" fill="#3d88f5" opacity="0.7"/>
</svg>
